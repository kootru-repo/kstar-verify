name: Bug report
description: Something in the verification suite doesn't do what it says
title: "[bug] "
labels: [bug]
body:
  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproduction
      description: Exact commands that trigger the bug, starting from a fresh clone.
      render: bash
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: python_version
    attributes:
      label: Python version
      placeholder: e.g. 3.12.5
    validations:
      required: true

  - type: input
    id: lean_toolchain
    attributes:
      label: Lean toolchain (if relevant)
      placeholder: leanprover/lean4:v4.29.0-rc8

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. Windows 11 / Ubuntu 22.04 / macOS 14.5
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      render: shell
