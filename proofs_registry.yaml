  statements_file: lean4/KstarFormal/Statements.lean
  axioms_file: lean4/KstarFormal/Axioms.lean
  ci_pipeline: lean4/.github/workflows/lean4-build.yml
  architecture: 'Algebraic/combinatorial content fully machine-verified (0 sorry). Physical conclusions (F=0, min F <= 1/2,
    eps_pos bound) proved FROM 5 standard axioms declared in Axioms.lean. ''#print axioms <thm>'' reveals per-theorem axiom
    dependencies. (v2 refinement 2026-04-08: parseval_pauli_bloch promoted from axiom to theorem; the algebraic bound is purely
    linarith over the Parseval identity hypothesis + purity. Net trust base: 4 propositional axioms. v3 refinement 2026-04-09:
    weyl_eigenvalue_bound promoted from axiom to theorem; le_trans + div_le_div_of_nonneg_right over the unmeasured-weight
    bound.)

    '
  axioms:
  - id: witness_states_are_valid
    label: (I +/- P0)/d are density matrices
    ref: Nielsen & Chuang, Sec 2.4
  - id: fidelity_orthogonal_zero
    label: F(rho+, rho-) = 0 for orthogonal-support states
    ref: Uhlmann 1976
  - id: fidelity_witness_traceproj_decomp
    label: 'Atomic Schatten-rank decomposition: F(sigma_hat, rho+) + F(sigma_hat, rho-) <= 1'
    ref: Fuchs & van de Graaf 1999
    note: fidelity_sum_complementary promoted to theorem (derived from this axiom). Axiomatised because Mathlib4 lacks Schatten-norm
      infrastructure
  - id: fidelity_nonneg
    label: F(rho, sigma) >= 0
    ref: definition
  - id: weyl_eigenvalue_bound
    label: eps_pos <= ||perturbation||_op
    ref: Bhatia, Matrix Analysis, Thm III.2.1
    status: promoted_to_theorem
