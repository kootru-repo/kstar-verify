- id: lem:spectral_q_main
  label: Lemma 5 (Spectral decomposition, general q)
  type: lemma
  source: manuscript
  lines:
  - 1964
  - 2028
  claims:
  - G(K) lies in Bose-Mesner algebra of H(n,q) iff q <= 3 (new iff characterization)
  - 'For q <= 3: full Krawtchouk decomposition G(K) = sum_w lambda_w(K) E_w with lambda_w = q^n c_w / [C(n,w)(q-1)^w]'
  - 'For q >= 4: G(K) is weight-block-diagonal (S_n-invariant) but not distance-class-constant'
