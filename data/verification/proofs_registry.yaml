  - id: prop:hradil_R_operator
    label: "Hradil R-operator closed form and fixed-point characterization"
    type: proposition
    source: manuscript
    lines: [342, 360]
    claims:
      - "The per-measurement R-operator update for the Pauli binomial likelihood admits the closed form (1 - b_i y_i)/(1 - y_i^2) I + (b_i - y_i)/(1 - y_i^2) P_i (Eq. 1)"
      - "Both coefficients are regular at y_i = 0, reducing the contribution to I + b_i P_i, so no ratio clipping is required"
      - "At the fixed point b_i = y_i, the per-measurement contribution collapses to identity-only: Pauli coefficient zero, identity coefficient 1/2"
      - "Therefore R is proportional to the identity at the fixed point and the iteration rho -> R rho R / tr(R rho R) is stationary"
    claim_anchors:
      - 'no ratio clipping is required'
      - '$R = I$ at the fixed point'
    depends_on: []
    key_values:
      identity_coeff_at_fixpoint: "1/2"
      pauli_coeff_at_fixpoint: 0
      regular_at_y_zero: true
    lean4_theorem: hradil_R_closed_form
    lean4_tier1: hradil_R_fixed_point
    lean4_status: proved
    lean4_axioms: []
    mutation_killed: true
