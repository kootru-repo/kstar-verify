- id: lem:hessian
  label: Lemma 1 (Fisher-Hessian spectral decomposition)
  type: lemma
  source: manuscript
  lines:
  - 484
  - 547
  claims:
  - Hessian is diagonal in Pauli-Bloch coordinates
  - h_P = N_s / (1 - x_P^2) for measured informative operators
  - Uninformative measured operators have h_P = N_s (uniform)
  - Flat directions (unmeasured) have eigenvalue 0
  - kappa_info = (1 - x_min^2) / (1 - x_max^2)
  - 'Hoeffding bound per operator: Pr(|y_hat - x_P| > t) <= 2 exp(-N_s t^2 / 2)'
  - Per-operator marginal likelihood factorizes; grouped-basis joint likelihood is multinomial with O(1/N_s) off-diagonal
    Hessian
  claim_anchors:
  - h_P = N_s/(1 - x_P^2) > N_s
  - \Pr(|\hat{y}_P - x_P| > t) \le 2\exp(-N_s t^2/2)
  - multinomial in the $2^n$ outcomes
  - \kappa_{\mathrm{info}} = (1 - x_{\min}^2)/(1 - x_{\max}^2)
  depends_on: []
  verification_scope:
    claim_status: proved
    claim_range: all n, all states
    verified_at:
      n:
