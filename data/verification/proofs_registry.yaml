  # ============================================================
  - id: prop:psd_contraction
    label: "SM Proposition 4 (PSD contraction)"
    type: proposition
    source: supplemental_material
    lines: [1362, 1450]
    claims:
      - "Bounded-Bloch regime: |x_P|, |y_hat_P| <= t_star < 1 for all P in S"
      - "PSD-MLE Pauli coordinates satisfy sum_P (y_P(rho_hat) - y_hat_P)^2 <= [1/(1-t_star^2)] sum_P (x_P - y_hat_P)^2"
      - "Proof via per-operator log-likelihood l_P''(y) = -N_s/(1-y^2), with N_s <= |l_P''| <= N_s/(1-t_star^2) on |y| <= t_star"
      - "Taylor expansion + MLE optimality L(rho_hat) >= L(rho) chains the three inequalities"
      - "Triangle inequality gives sum (x_P - y_P(rho_hat))^2 <= 4 sum (x_P - y_hat_P)^2"
      - "Factor 4 is tight (saturated when y_P(rho_hat) - y_hat_P = -(x_P - y_hat_P)) but conservative in practice"
      - "Hoeffding event E_delta gives t_star = O(sqrt(ln(M/delta)/N_s))"
      - "In shot-noise-limited regime t_star -> 0, prefactor 1/(1-t_star^2) = 1 + O(ln(M/delta)/N_s)"
    claim_anchors:
      - '-N_s/(1 - y^2)'
      - '|c_P| \le t_\star'
      - '\frac{1}{1 - t_\star^2}'
      - 'shot-noise-limited regime'
    depends_on:
      - lem:hessian
    key_values:
      tight_constant: 4
      prefactor: "1/(1 - t_star^2)"
      t_star_scaling: "O(sqrt(ln(M/delta)/N_s))"
    lean4_theorem: psd_contraction
    lean4_status: proved
    lean4_axioms: []

