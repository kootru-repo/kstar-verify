  - Proof via per-operator log-likelihood l_P''(y) = -n_+/(1+y)^2 - n_-/(1-y)^2, with N_s/(1+t_star)^2 <= |l_P''| <= N_s/(1-t_star)^2
    on |y| <= t_star
  - Taylor expansion + MLE optimality L(rho_hat) >= L(rho) chains the three inequalities
  - Triangle inequality gives sum (x_P - y_P(rho_hat))^2 <= 4(1+t_star^2)/(1-t_star)^2 sum (x_P - y_hat_P)^2
  - Factor 4 is leading-order value (t_star -> 0); exact prefactor 4(1+t_star^2)/(1-t_star)^2 > 4 for t_star > 0; conservative
    for PSD estimators
  - Hoeffding event E_delta gives t_star = O(sqrt(ln(M/delta)/N_s))
